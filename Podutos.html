<!DOCTYPE html>
<html lang="pt-BR">

<head>
    <meta charset="UTF-8">
    <title>Loja GTA 6</title>
    <style>
        body {
            margin: 0;
            font-family: Arial, sans-serif;
            background-color: #0d0d0d;
            color: white;
        }

        header {
            background: linear-gradient(90deg, #ff0055, #6600ff);
            padding: 20px;
            text-align: center;
        }

        header h1 {
            margin: 0;
        }

        nav {
            background-color: #111;
            padding: 10px;
            text-align: center;
        }

        nav a {
            color: #ff0055;
            margin: 0 15px;
            text-decoration: none;
            font-weight: bold;
        }

        .container {
            padding: 20px;
            text-align: center;
        }

        .produto {
            background-color: #1a1a1a;
            border-radius: 10px;
            display: inline-block;
            width: 250px;
            margin: 15px;
            padding: 15px;
            transition: 0.3s;
        }

        .produto:hover {
            transform: scale(1.05);
        }

        .produto img {
            width: 100%;
            border-radius: 10px;
        }

        .botao {
            margin-top: 10px;
            padding: 10px;
            border: none;
            background-color: #ff0055;
            color: white;
            border-radius: 5px;
            cursor: pointer;
        }

        footer {
            background-color: #111;
            text-align: center;
            padding: 10px;
            margin-top: 20px;
        }
    </style>
</head>

<body>

    <header>
        <h1>🔥 Loja GTA 6 🔥</h1>
        <p>Os melhores produtos do universo GTA</p>
    </header>

    <nav>
        <a href="http://127.0.0.1:3000/index.html?serverWindowId=e8bdc26a-5877-468d-9e4c-3572b77797fa#">Início</a>
        <a href="#">Produtos</a>
        <a href="http://127.0.0.1:3000/contato.html?serverWindowId=2f187a98-9d69-4a07-bc1c-573ca3f52905">Contato</a>
    </nav>

    <div class="container">
        <h2>Produtos em destaque</h2>

        <div class="produto">
            <img src="https://encrypted-tbn0.gstatic.com/images?q=tbn:ANd9GcTalogddHhDiA41HKQjGN4XSPEZ2mi3SG2PiA&s"
                alt="Jogo GTA">
            <h3>GTA 6 (cd)</h3>
            <p>R$ 10.000</p>
            <button class="botao">Comprar</button>
        </div>

        <div class="produto">
            <img src="https://encrypted-tbn0.gstatic.com/images?q=tbn:ANd9GcSbpL5ip0DuPrWaIhvjR4AGf_6R8S9dfI_ubA&s"
                alt="Camiseta GTA">
            <h3>Camiseta GTA</h3>
            <p>R$ 79,90</p>
            <button class="botao">Comprar</button>
        </div>

        <div class="produto">
            <img src="https://encrypted-tbn0.gstatic.com/images?q=tbn:ANd9GcTi1sdmnqT65Kfc75kmxuHnv_j0wzmFQWgzOg&s"
                alt="Poster GTA">
            <h3>Poster GTA 6</h3>
            <p>R$ 39,90</p>
            <button class="botao">Comprar</button>
        </div>

    </div>

    <footer>
        <p>© 2026 Loja GTA 6 - Todos os direitos reservados</p>
    </footer>

</body>

</html>
