<!DOCTYPE html>
<html lang="pt-BR">

<head>
    <meta charset="UTF-8">
    <title>Contato - Loja GTA 6</title>
    <style>
        body {
            margin: 0;
            font-family: Arial, sans-serif;
            background-color: #0d0d0d;
            color: white;
        }

        header {
            background: linear-gradient(90deg, #ff0055, #6600ff);
            padding: 20px;
            text-align: center;
        }

        nav {
            background-color: #111;
            padding: 10px;
            text-align: center;
        }

        nav a {
            color: #ff0055;
            margin: 0 15px;
            text-decoration: none;
            font-weight: bold;
        }

        .container {
            padding: 20px;
            max-width: 600px;
            margin: auto;
        }

        form {
            background-color: #1a1a1a;
            padding: 20px;
            border-radius: 10px;
        }

        input,
        textarea {
            width: 100%;
            padding: 10px;
            margin: 10px 0;
            border: none;
            border-radius: 5px;
        }

        button {
            background-color: #ff0055;
            color: white;
            padding: 10px;
            border: none;
            border-radius: 5px;
            cursor: pointer;
            width: 100%;
        }

        button:hover {
            background-color: #ff3377;
        }

        footer {
            background-color: #111;
            text-align: center;
            padding: 10px;
            margin-top: 20px;
        }
    </style>
</head>

<body>

    <header>
        <h1>Contato</h1>
        <p>Fale com a Loja GTA 6</p>
    </header>

    <nav>
        <a href="index.html">Início</a>
        <a href="Podutos.html">Produtos</a>
        <a href="contato.html">Contato</a>
    </nav>

    <div class="container">
        <h2>Envie sua mensagem</h2>

        <form>
            <input type="text" placeholder="Seu nome" required>
            <input type="email" placeholder="Seu email" required>
            <textarea rows="5" placeholder="Digite sua mensagem..." required></textarea>
            <button type="submit">Enviar</button>
        </form>
    </div>

    <footer>
        <p>© 2026 Loja GTA 6</p>
    </footer>

</body>

</html>
